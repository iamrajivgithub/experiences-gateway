# ═══════════════════════════════════════════════════════════════════════════════
#  Traefik Dynamic Configuration — Routes, Middleware, Services
#  File     : config/routes.yml
#  Watched  : Yes (auto-reloads on change — no Traefik restart needed)
#
#  Structure:
#    http.routers     — match incoming requests to a service
#    http.middlewares — transform requests (auth, CORS, rate limit, headers)
#    http.services    — define upstream microservice endpoints
# ═══════════════════════════════════════════════════════════════════════════════

http:

  # ── Routers ──────────────────────────────────────────────────────────────────
  # Each router matches a URL pattern and applies middleware before forwarding.
  # Priority: more specific rules win (longer prefix = higher priority).

  routers:

    # ── Experience Service — protected WRITE (admin create/update/delete) ─────
    # Method-aware: write verbs require a valid JWT so the gateway injects the
    # X-User-* headers the service's require_admin depends on. Higher priority
    # than experience-public so writes never fall through to the public rule.
    experience-write:
      rule: "(PathPrefix(`/api/v1/experiences`) || PathPrefix(`/api/v1/stays`) || PathPrefix(`/api/v1/dining`) || PathPrefix(`/api/v1/spa`) || PathPrefix(`/api/v1/catalog`)) && (Method(`POST`) || Method(`PUT`) || Method(`PATCH`) || Method(`DELETE`))"
      entryPoints: [web]
      middlewares: [cors, jwt-auth, request-headers, rate-limit-auth]
      service: experience-service
      priority: 30

    # ── Experience Service — public READ (browse/detail) ──────────────────────
    experience-public:
      rule: "PathPrefix(`/api/v1/experiences`) || PathPrefix(`/api/v1/stays`) || PathPrefix(`/api/v1/dining`) || PathPrefix(`/api/v1/spa`) || PathPrefix(`/api/v1/catalog`)"
      entryPoints: [web]
      middlewares: [cors, request-headers, rate-limit-public]
      service: experience-service
      priority: 10

    # ── Host (supplier) — protected; experience-service owns it ───────────────
    host:
      rule: "PathPrefix(`/api/v1/host`)"
      entryPoints: [web]
      middlewares: [cors, jwt-auth, request-headers, rate-limit-auth]
      service: experience-service
      priority: 20

    # ── Booking Service — always protected ───────────────────────────────────
    booking:
      rule: "PathPrefix(`/api/v1/bookings`) || PathPrefix(`/api/v1/payments`)"
      entryPoints: [web]
      middlewares: [cors, jwt-auth, request-headers, rate-limit-auth]
      service: booking-service
      priority: 10

    # ── Availability — public endpoints, both routed to booking-service ─────────
    #
    # booking-service owns the availability table (PostgreSQL), so ALL
    # availability queries must go there, not to experience-service.
    #
    # Two URL patterns are handled:
    #
    #   GET /api/v1/availability/slots
    #       Batch check for multiple experiences on one date.
    #       Used by search results page to show availability badges.
    #
    #   GET /api/v1/experiences/{id}/availability
    #       Single-experience month calendar.
    #       Used by the experience detail page availability section.
    #       Higher priority (20) so it wins over the experience-public rule (10).
    #
    # Admin availability write — MUST be protected. Higher priority than the
    # public availability rule so the admin path requires a valid JWT.
    availability-admin:
      rule: "PathPrefix(`/api/v1/availability/admin`)"
      entryPoints: [web]
      middlewares: [cors, jwt-auth, request-headers, rate-limit-auth]
      service: booking-service
      priority: 25

    availability-public:
      rule: "PathPrefix(`/api/v1/availability`)"
      entryPoints: [web]
      middlewares: [cors, request-headers, rate-limit-public]
      service: booking-service
      priority: 15

    experience-availability:
      rule: "PathRegexp(`^/api/v1/experiences/[^/]+/availability`)"
      entryPoints: [web]
      middlewares: [cors, request-headers, rate-limit-public]
      service: booking-service
      priority: 20

    # ── Auth — register is public, no JWT needed ─────────────────────────────
    auth-public:
      rule: "PathPrefix(`/api/v1/auth`)"
      entryPoints: [web]
      middlewares: [cors, request-headers, rate-limit-public]
      service: user-service
      priority: 20

    # ── User Service — always protected ──────────────────────────────────────
    user:
      rule: "PathPrefix(`/api/v1/users`)"
      entryPoints: [web]
      middlewares: [cors, jwt-auth, request-headers, rate-limit-auth]
      service: user-service
      priority: 10

    # ── Review Service — read public, write protected ─────────────────────────
    review:
      rule: "PathPrefix(`/api/v1/reviews`)"
      entryPoints: [web]
      middlewares: [cors, request-headers, rate-limit-public]
      service: review-service
      priority: 10

    # ── Search Service — public ───────────────────────────────────────────────
    search:
      rule: "PathPrefix(`/api/v1/search`)"
      entryPoints: [web]
      middlewares: [cors, request-headers, rate-limit-public]
      service: search-service
      priority: 10

    # ── Media Service — public READ of stored files (browser <img>/<video>) ───
    # Stable, backend-agnostic delivery URL. Higher priority than the protected
    # media rule so file reads don't require a JWT.
    media-file:
      rule: "PathPrefix(`/api/v1/media/file`)"
      entryPoints: [web]
      middlewares: [cors, media-headers, rate-limit-public]
      service: media-service
      priority: 20

    # ── Media Service — protected (upload / delete / presigned) ───────────────
    media:
      rule: "PathPrefix(`/api/v1/media`)"
      entryPoints: [web]
      middlewares: [cors, jwt-auth, request-headers, rate-limit-auth]
      service: media-service
      priority: 10

    # ── Notification Service — protected ──────────────────────────────────────
    notification:
      rule: "PathPrefix(`/api/v1/notifications`)"
      entryPoints: [web]
      middlewares: [cors, jwt-auth, request-headers, rate-limit-auth]
      service: notification-service
      priority: 10

    # ── Lookup Service — authenticated legal acceptance (member/host) ─────────
    # Needs the X-User-* headers jwt-auth injects. Higher priority than the
    # public legal rule so /legal/acceptance never falls through to it.
    legal-acceptance:
      rule: "PathPrefix(`/api/v1/legal/acceptance`)"
      entryPoints: [web]
      middlewares: [cors, jwt-auth, request-headers, rate-limit-auth]
      service: lookup-service
      priority: 25

    # ── Lookup Service — public country/city + feature flags + legal + stats ──
    lookup-public:
      rule: "PathPrefix(`/api/v1/lookup`) || PathPrefix(`/api/v1/features`) || PathPrefix(`/api/v1/legal`) || PathPrefix(`/api/v1/stats`)"
      entryPoints: [web]
      middlewares: [cors, request-headers, rate-limit-public]
      service: lookup-service
      priority: 10

    # ── Lookup Service — admin (features + country/city + types + legal mgmt) ─
    lookup-admin:
      rule: "PathPrefix(`/api/v1/admin/features`) || PathPrefix(`/api/v1/admin/lookup`) || PathPrefix(`/api/v1/admin/legal`)"
      entryPoints: [web]
      middlewares: [cors, jwt-auth, request-headers, rate-limit-auth]
      service: lookup-service
      priority: 20

    # ── Health check — no auth, no rate limit ────────────────────────────────
    health:
      rule: "PathPrefix(`/health`)"
      entryPoints: [web]
      service: noop@internal
      priority: 100

  # ── Middleware ────────────────────────────────────────────────────────────────
  # Middleware is applied in the order listed in the router's middleware array.

  middlewares:

    # ── CORS ──────────────────────────────────────────────────────────────────
    cors:
      headers:
        accessControlAllowOriginList:
          - "http://localhost:3000"
          - "http://localhost:3001"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "Authorization"
          - "Content-Type"
          - "X-Requested-With"
          - "X-Request-ID"
        accessControlExposeHeaders:
          - "X-Request-ID"
        accessControlAllowCredentials: true
        accessControlMaxAge: 86400

    # ── JWT Authentication (Keycloak) ─────────────────────────────────────────
    # Validates JWT tokens via Keycloak JWKS endpoint.
    # Services receive X-Forwarded-User and X-Forwarded-Roles headers.
    jwt-auth:
      forwardAuth:
        address: "http://auth-validator:9000/validate"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-User-ID"          # Keycloak sub (user UUID)
          - "X-User-Email"       # User email
          - "X-User-Roles"       # Comma-separated roles
          - "X-User-Name"        # Full name

    # ── Security Headers ──────────────────────────────────────────────────────
    request-headers:
      headers:
        customRequestHeaders:
          X-Gateway: "experience-api-gateway"
          X-Forwarded-Proto: "http"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          X-XSS-Protection: "1; mode=block"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Cache-Control: "no-store"

    # ── Media headers — same security headers but cacheable (static files) ────
    media-headers:
      headers:
        customRequestHeaders:
          X-Gateway: "experience-api-gateway"
          X-Forwarded-Proto: "http"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Cache-Control: "public, max-age=86400"

    # ── Rate Limiting — public routes ─────────────────────────────────────────
    rate-limit-public:
      rateLimit:
        average: 100            # requests per second
        burst: 50               # allow short bursts
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 1

    # ── Rate Limiting — authenticated routes ──────────────────────────────────
    rate-limit-auth:
      rateLimit:
        average: 300
        burst: 100
        period: 1s
        sourceCriterion:
          requestHeaderName: "X-User-ID"   # rate limit per user, not IP

    # ── Strip API prefix (optional — remove if services expect /api/v1) ───────
    strip-api-prefix:
      stripPrefix:
        prefixes:
          - "/api/v1"

  # ── Services (upstream microservice addresses) ────────────────────────────────
  # These point to the service hostnames on the shared Docker network.
  # Change host:port here when migrating to cloud (no router/middleware changes).

  services:

    experience-service:
      loadBalancer:
        servers:
          - url: "http://experience-service:8002"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s

    booking-service:
      loadBalancer:
        servers:
          - url: "http://booking-service:8003"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s

    user-service:
      loadBalancer:
        servers:
          - url: "http://user-service:8004"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s

    review-service:
      loadBalancer:
        servers:
          - url: "http://review-service:8005"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s

    search-service:
      loadBalancer:
        servers:
          - url: "http://search-service:8006"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s

    media-service:
      loadBalancer:
        servers:
          - url: "http://media-service:8007"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s

    notification-service:
      loadBalancer:
        servers:
          - url: "http://notification-service:8008"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s

    lookup-service:
      loadBalancer:
        servers:
          - url: "http://lookup-service:8009"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s
